<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <title>Password Generator App</title>
  </head>
  <body>
    <h1>Password Generator</h1>
    
    <main>
      <div id="result-div">
        <input type="text" id="password" placeholder="P4$5W0rD!" readonly>
        <img src="images/icon-copy.svg" alt="Copy password">
      </div>

      <div id="form-div">
        <form>
          <div id="length-div">
            <div class="label-div">
              <label for="length">Character Length</label>
              <p id="length-text">0</p>
            </div>

            <input type="range" id="length" name="length" min="0" max="20" value="0">
          </div>

          <div id="choices-div">
            <div>
              <input type="checkbox" id="uppercase" name="uppercase">
              <label for="uppercase">Include Uppercase Letters</label>
            </div>

            <div>
              <input type="checkbox" id="lowercase" name="lowercase">
              <label for="lowercase">Include Lowercase Letters</label>
            </div>

            <div>
              <input type="checkbox" id="numbers" name="numbers">
              <label for="numbers">Include Numbers</label>
            </div>

            <div>
              <input type="checkbox" id="symbols" name="symbols">
              <label for="symbols">Include Symbols</label>
            </div>
          </div>

          <div id="strength-div">
            <p>STRENGTH</p>
            <div id="strength-grid">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
          </div>

          <button type="button">GENERATE <img src="images/icon-arrow-right.svg"></button>
        </form>
      </div>
    </main>
  </body>
</html>
